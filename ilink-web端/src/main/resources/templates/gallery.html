<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成果展示 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/asset-publish.css?v=1.0" rel="stylesheet">
</head>
<body data-app-page="gallery" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'gallery')"></div>
    <div class="il-page-wrapper">
        <div class="il-hero">
            <p class="il-hero-eyebrow">成果展示 · 项目沉淀</p>
            <h1 class="il-hero-title">成果展示</h1>
            <p class="il-hero-desc">浏览和展示竞赛成果、科研项目、学术荣誉</p>
        </div>

        <div class="il-toolbar">
            <div class="il-toolbar-row">
                <form id="filterForm" class="il-toolbar-filters" onsubmit="event.preventDefault(); GalleryApp.load(1);">
                    <div class="il-toolbar-search">
                        <div th:replace="~{fragments/search-field :: field('keyword', '搜索成果名称、描述…', '关键词', 'text', 'il-search-field--toolbar')}"></div>
                    </div>
                    <select id="category" class="il-toolbar-select" aria-label="分类">
                        <option value="">全部分类</option>
                        <option value="竞赛获奖">竞赛获奖</option>
                        <option value="论文发表">论文发表</option>
                        <option value="科研项目">科研项目</option>
                        <option value="作品项目">作品 / 项目</option>
                        <option value="荣誉称号">荣誉称号</option>
                        <option value="奖学金">奖学金</option>
                    </select>
                    <select id="sort" class="il-toolbar-select" aria-label="排序">
                        <option value="latest">最新发布</option>
                        <option value="popular">最多浏览</option>
                    </select>
                    <button type="reset" class="il-btn il-btn-secondary">重置</button>
                    <button type="submit" class="il-btn il-btn-primary">搜索</button>
                </form>
                <div class="il-toolbar-actions">
                    <button type="button" class="il-btn il-btn-primary" id="publishBtn" onclick="GalleryApp.openPublish()">
                        <svg class="il-btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <span>发布成果</span>
                    </button>
                </div>
            </div>
        </div>
        <div id="listContainer"></div>
        <div id="pagination"></div>
    </div>

    <div th:replace="fragments/asset-publish-modal :: modal"></div>
    <div th:replace="fragments/footer :: footer"></div>
    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=7.4"></script>
    <script src="/js/asset-publish.js?v=1.0"></script>
    <script>
(function(){
    if (window.GalleryApp) return;
    var PAGE = 1, SIZE = 12, app = {};

    function $(id) { return document.getElementById(id); }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmt(d) { if(!d) return ''; d=new Date(d); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function authorBlock(a) {
        var op = a.ownerPreview;
        if (!op || op.id == null) {
            return '<div class="gallery-card__author gallery-card__author--empty"><span class="gallery-card__author-name">匿名用户</span></div>';
        }
        var name = typeof displayUsername === 'function'
            ? displayUsername(op)
            : '';
        var avatar = typeof galleryPublisherAvatarHtml === 'function'
            ? galleryPublisherAvatarHtml(op, 'gallery-card__avatar')
            : '';
        return '<div class="gallery-card__author">' + avatar +
            '<span class="gallery-card__author-name">' + esc(name || '匿名用户') + '</span></div>';
    }
    function toast(m, t) {
        var type = t === 'error' ? 'error' : (t === 'warn' ? 'warning' : 'success');
        if (window.ILink && window.ILink.showMessage) { window.ILink.showMessage(m, type); return; }
        var e = document.getElementById('gToast') || (function(){ var d=document.createElement('div'); d.id='gToast'; d.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;transition:opacity 0.3s;opacity:0;pointer-events:none;'; document.body.appendChild(d); return d; })();
        e.textContent=m; e.style.background=t==='error'?'#FF3141':t==='warn'?'#FF8F1F':'#00B578'; e.style.color='#fff'; e.style.opacity='1';
        clearTimeout(e.t); e.t=setTimeout(function(){e.style.opacity='0';},2500);
    }

    app.init = function() {
        ($('keyword')||{}).addEventListener('keyup', function(ev){ if(ev.key==='Enter') app.load(1); });
        ($('category')||{}).addEventListener('change', function(){ app.load(1); });
        ($('sort')||{}).addEventListener('change', function(){ app.load(1); });
        ($('filterForm')||{}).addEventListener('reset', function() {
            setTimeout(function(){ app.load(1); }, 0);
        });
        this.load(1);
    };

    app.load = async function(p) {
        PAGE = Math.max(1,p||1);
        var kw = ($('keyword')||{}).value||'';
        var cat = ($('category')||{}).value||'';
        var srt = ($('sort')||{}).value||'latest';
        try {
            var r = await fetch('/api/asset/list?'+new URLSearchParams({page:PAGE,size:SIZE,keyword:kw,category:cat,sort:srt}));
            var d = await r.json();
            var pag = (d.extra && d.extra.pagination) || d.pagination;
            if (d.code===200) { this.render(d.data, pag); }
            else { toast(d.message||'加载失败','error'); }
        } catch(e) { toast('网络异常','error'); }
    };

    app.render = function(rows, pag) {
        var el = $('listContainer'); if(!el) return;
        if (!rows||!rows.length) {
            el.innerHTML = '<div class="empty-state"><div class="empty-state__icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><h3>暂无成果</h3><p>还没有人发布成果，成为第一个吧！</p><button class="il-btn il-btn-primary" onclick="GalleryApp.openPublish()">发布成果</button></div>';
            $('pagination').innerHTML = ''; return;
        }
        el.innerHTML = '<div class="gallery-grid">'+rows.map(function(a){
            var desc = (a.description||'').replace(/（分类：[^）]*）/g,'').trim();
            var catM = (a.description||'').match(/（分类：([^）]+)）/);
            var cat = a.category || (catM ? catM[1] : '');
            var meta = (cat ? '<span class="gallery-tag">'+esc(cat)+'</span>' : '') +
                '<span class="gallery-date">'+fmt(a.createdAt)+'</span>';
            var body = '<div class="gallery-card__body"><h3 class="gallery-card__title">'+esc(a.title||'未命名成果')+'</h3>'+
                (desc ? '<p class="gallery-card__desc">'+esc(desc)+'</p>' : '') + '</div>';
            var arrow = '<span class="gallery-card__arrow" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>';
            return '<div class="gallery-card" role="link" tabindex="0" onclick="location.href=\'/asset-detail.html?id='+(a.id||'')+'\'">'+
                authorBlock(a)+'<div class="gallery-card__content"><div class="gallery-card__meta">'+meta+'</div>'+body+'</div>'+arrow+'</div>';
        }).join('')+'</div>';
        if (typeof hideGalleryPublisherAvatarFallbacks === 'function') {
            hideGalleryPublisherAvatarFallbacks(el);
        }
        this.paginate(pag);
    };

    app.paginate = function(pag) {
        var el = $('pagination'); if(!el||!pag) { el.innerHTML=''; return; }
        var tp = Math.ceil(pag.total/(pag.size||SIZE));
        if (tp<=1) { el.innerHTML=''; return; }
        var h = '<div class="pagination-wrap">';
        h += '<button class="page-btn" onclick="GalleryApp.load('+(pag.page-1)+')"'+ (pag.page<=1?' disabled':'') + '>上一页</button>';
        h += '<span class="page-info">第 '+pag.page+' / '+tp+' 页</span>';
        h += '<button class="page-btn" onclick="GalleryApp.load('+(pag.page+1)+')"'+ (pag.page>=tp?' disabled':'') + '>下一页</button>';
        h += '</div>'; el.innerHTML = h;
    };

    app.clearFilter = function() { ($('keyword')||{}).value=''; ($('category')||{}).value=''; ($('sort')||{}).value='latest'; this.load(1); };
    app.openPublish = function() {
        if (window.AssetPublish) {
            AssetPublish.openCreate(function() { app.load(1); });
        }
    };

    window.GalleryApp = app;
    document.addEventListener('DOMContentLoaded', function() {
        if (window.AssetPublish) AssetPublish.bind({ onSuccess: function() { app.load(1); } });
        app.init();
    });
})();
    </script>
</body>
</html>
