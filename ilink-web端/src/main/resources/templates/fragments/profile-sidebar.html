<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebar (active)">
    <aside class="il-profile-sidebar">
        <h3 class="il-profile-sidebar-title">个人中心</h3>
        <p class="il-profile-sidebar-subtitle">管理您的账号</p>
        <nav class="il-profile-nav">
            <a th:href="@{/profile.html}" href="/profile.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'overview'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"/>
                </svg>
                <span>概览</span>
            </a>
            <a th:href="@{/profile-edit.html}" href="/profile-edit.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'edit'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M12 12a5 5 0 100-10a5 5 0 000 10z"/>
                    <path d="M4 22a8 8 0 0116 0"/>
                </svg>
                <span>编辑资料</span>
            </a>
            <a th:href="@{/profile-honors.html}" href="/profile-honors.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'honors'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M12 3l2.4 7.4H22l-6 4.6 2.3 7L12 17.8 5.7 22 8 14.4 2 10.6h7.6L12 3z"/>
                </svg>
                <span>个人成果</span>
            </a>
            <a th:href="@{/profile-posts.html}" href="/profile-posts.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'posts'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M7 4h10a2 2 0 012 2v14l-4-2.5L11 18l-4 1.5V6a2 2 0 012-2z"/>
                    <path d="M9 9h6M9 13h4"/>
                </svg>
                <span>我的文章</span>
            </a>
            <a th:href="@{/profile-favorites.html}" href="/profile-favorites.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'favorites'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M12 2.8l2.8 5.7 6.3.9-4.6 4.6 1.1 6.2L12 17.9 6.4 20.1l1.1-6.2L2.9 9.4l6.3-.9L12 2.8z"/>
                </svg>
                <span>我的收藏</span>
            </a>
            <a th:href="@{/profile-password.html}" href="/profile-password.html"
               class="il-profile-nav-item"
               th:classappend="${active == 'password'} ? ' active' : ''">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2z"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
                <span>修改密码</span>
            </a>
        </nav>
    </aside>
</th:block>
</body>
</html>
