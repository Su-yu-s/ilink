<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导师招贤 - iLink</title>

    <th:block th:replace="~{fragments/head-assets :: core(bootstrap=true)}"></th:block>
    <link href="/css/teacher-wall.css?v=2.3" rel="stylesheet">
</head>
<body data-app-page="teacher-wall" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="~{fragments/header :: header(${currentUser}, 'teacher')}"></div>

    <div class="il-page-wrapper">

        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-inner">
                <div class="hero-eyebrow">导师招贤 · 竞赛指导</div>
                <h1 class="hero-title">仰之弥高，钻之弥坚。</h1>
                <p class="hero-desc">
                    循着前辈的足迹向上，每一步都走得更深、更稳，终见星辰。
                </p>
            </div>
        </section>

        <!-- Search Panel -->
        <section class="toolbar-section">
            <div class="toolbar-inner">
                <div class="search-panel">
                    <div class="search-input-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <div th:replace="~{fragments/search-field :: field('keyword', '搜索姓名、专业或研究方向', '', 'search', '')}"></div>
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-select">
                        <select id="major" aria-label="专业领域">
                            <option value="">全部专业</option>
                            <option value="计算机科学" th:selected="${major == '计算机科学'}">计算机科学</option>
                            <option value="电子工程" th:selected="${major == '电子工程'}">电子工程</option>
                            <option value="机械工程" th:selected="${major == '机械工程'}">机械工程</option>
                            <option value="生物医学" th:selected="${major == '生物医学'}">生物医学</option>
                        </select>
                    </div>
                    <div class="search-select">
                        <select id="title" aria-label="职称">
                            <option value="">全部职称</option>
                            <option value="教授" th:selected="${title == '教授'}">教授</option>
                            <option value="副教授" th:selected="${title == '副教授'}">副教授</option>
                            <option value="讲师" th:selected="${title == '讲师'}">讲师</option>
                        </select>
                    </div>
                    <button type="button" class="search-btn" id="searchBtn">搜索</button>
                    <div class="search-apply">
                        <button type="button" class="btn-pill-accent" onclick="openApplyModal()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                            申请成为导师
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Mentor Grid -->
        <section class="content-section">
            <div class="content-inner">
                <div id="teacherList"></div>

                <!-- Pagination -->
                <nav id="pagination" class="mt-4 d-none">
                    <ul class="pagination justify-content-center">
                    </ul>
                </nav>
            </div>
        </section>

    </div>

    <!-- 申请成为导师模态框 -->
    <div class="teacher-apply-overlay" id="applyModal" aria-hidden="true">
        <div class="teacher-apply-dialog" role="dialog" aria-modal="true" aria-labelledby="applyModalTitle" onclick="event.stopPropagation()">
            <header class="teacher-apply-dialog__header">
                <h5 class="teacher-apply-dialog__title" id="applyModalTitle">申请成为导师</h5>
                <button type="button" class="teacher-apply-dialog__close" aria-label="关闭" onclick="closeApplyModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </header>
            <div class="teacher-apply-dialog__body">
                <form id="applyForm" class="teacher-apply-form">
                    <div class="teacher-apply-field">
                        <label for="applicationMajor" class="teacher-apply-label">专业领域 *</label>
                        <input type="text" class="teacher-apply-input" id="applicationMajor" required placeholder="如：计算机科学与技术">
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationTitle" class="teacher-apply-label">职称 *</label>
                        <input type="text" class="teacher-apply-input" id="applicationTitle" required placeholder="如：教授、副教授、讲师">
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationBio" class="teacher-apply-label">个人简介 *</label>
                        <textarea class="teacher-apply-textarea" id="applicationBio" rows="3" required placeholder="介绍一下你的教学经验和研究方向…"></textarea>
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationResearch" class="teacher-apply-label">研究方向 *</label>
                        <textarea class="teacher-apply-textarea" id="applicationResearch" rows="2" required placeholder="多个方向用逗号分隔"></textarea>
                    </div>
                </form>
            </div>
            <footer class="teacher-apply-dialog__footer">
                <button type="button" class="btn-pill-accent" style="border-color: rgba(0,0,0,0.15); color: #444;" onclick="closeApplyModal()">取消</button>
                <button type="button" class="btn-pill-accent" id="submitApply">提交申请</button>
            </footer>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.0"></script>
    <script src="/js/common.js?v=7.8"></script>
    <script src="/js/teacher-wall.js?v=4.5"></script>
</body>
</html>
