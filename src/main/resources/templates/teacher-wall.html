<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导师招贤 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
</head>
<body data-app-page="teacher-wall" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'teacher')"></div>

    <div class="il-page-wrapper">
        <!-- 粒子背景画布 -->
        <canvas id="particleCanvas" class="particle-canvas"></canvas>

        <div class="il-hero">
            <p class="il-hero-eyebrow">导师招贤 · 竞赛指导</p>
            <h1 class="il-hero-title">导师招贤</h1>
            <p class="il-hero-desc">寻找经验丰富的导师，获得专业竞赛指导</p>
        </div>

        <div class="il-toolbar">
            <div class="il-toolbar-row">
                <form id="filterForm" class="il-toolbar-filters">
                    <div class="il-toolbar-search">
                        <div th:replace="~{fragments/search-field :: field('keyword', '搜索姓名、专业或研究方向', '关键词', 'text', 'il-search-field--toolbar')}"></div>
                    </div>
                    <select id="major" class="il-toolbar-select" aria-label="专业领域">
                        <option value="">全部专业</option>
                        <option value="计算机科学">计算机科学</option>
                        <option value="电子工程">电子工程</option>
                        <option value="机械工程">机械工程</option>
                        <option value="生物医学">生物医学</option>
                    </select>
                    <select id="title" class="il-toolbar-select" aria-label="职称">
                        <option value="">全部职称</option>
                        <option value="教授">教授</option>
                        <option value="副教授">副教授</option>
                        <option value="讲师">讲师</option>
                    </select>
                    <button type="reset" class="il-btn il-btn-secondary">重置</button>
                    <button type="submit" class="il-btn il-btn-primary">搜索</button>
                </form>
                <div class="il-toolbar-actions">
                    <button type="button" id="applyBtn" class="il-btn il-btn-primary" onclick="openApplyModal()">
                        <svg class="il-btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>申请成为导师</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 导师列表 -->
        <div id="teacherList">
        </div>

        <!-- 分页 -->
        <nav id="pagination" class="mt-4 d-none">
            <ul class="pagination justify-content-center">
            </ul>
        </nav>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <!-- 申请成为导师模态框（专用 class，避免 components.css .il-modal 全屏 fixed 污染） -->
    <div class="teacher-apply-overlay" id="applyModal" aria-hidden="true">
        <div class="teacher-apply-dialog" role="dialog" aria-modal="true" aria-labelledby="applyModalTitle" onclick="event.stopPropagation()">
            <header class="teacher-apply-dialog__header">
                <h5 class="teacher-apply-dialog__title" id="applyModalTitle">申请成为导师</h5>
                <button type="button" class="teacher-apply-dialog__close" aria-label="关闭" onclick="closeApplyModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </header>
            <div class="teacher-apply-dialog__body">
                <form id="applyForm" class="teacher-apply-form">
                    <div class="teacher-apply-field">
                        <label for="applicationMajor" class="teacher-apply-label">专业领域 *</label>
                        <input type="text" class="teacher-apply-input" id="applicationMajor" required>
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationTitle" class="teacher-apply-label">职称 *</label>
                        <input type="text" class="teacher-apply-input" id="applicationTitle" required>
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationBio" class="teacher-apply-label">个人简介 *</label>
                        <textarea class="teacher-apply-textarea" id="applicationBio" rows="3" required></textarea>
                    </div>
                    <div class="teacher-apply-field">
                        <label for="applicationResearch" class="teacher-apply-label">研究方向 *</label>
                        <textarea class="teacher-apply-textarea" id="applicationResearch" rows="2" required></textarea>
                    </div>
                </form>
            </div>
            <footer class="teacher-apply-dialog__footer">
                <button type="button" class="il-btn il-btn-secondary" onclick="closeApplyModal()">取消</button>
                <button type="button" class="il-btn il-btn-primary" id="submitApply">提交申请</button>
            </footer>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.0"></script>
    <script src="/js/common.js?v=7.4"></script>
    <script src="/js/teacher-wall.js?v=4.5"></script>
</body>
</html>
