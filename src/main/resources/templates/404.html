<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - iLink</title>
    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
</head>
<body class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>

    <div class="il-error-page">
        <div class="il-error-card">
            <div class="il-error-brand" aria-hidden="true">iL</div>
            <p class="il-error-code">404</p>
            <h1 class="il-error-title">页面未找到</h1>
            <p class="il-error-desc">抱歉，您访问的页面不存在或已被移除。</p>
            <a href="/" class="il-btn il-btn-primary">返回首页</a>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=530"></script>
    <script src="/js/common.js?v=7.4"></script>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
