<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文章 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.0" rel="stylesheet">
</head>
<body data-profile-page="posts" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <div th:replace="~{fragments/profile-sidebar :: sidebar (active='posts')}"></div>

            <div class="il-profile-content">
                <div class="il-section-card">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title">我的文章</h2>
                            <p class="il-section-subtitle">在社区发布的文章会出现在这里，可随时编辑或删除</p>
                        </div>
                        <a href="/community.html" class="il-btn il-btn-primary">去社区发布新文章</a>
                    </div>

                    <div id="myPostsList" style="min-height: 100px;">
                        <p class="text-muted mb-0" style="font-size: 14px;">加载中…</p>
                    </div>
                    <nav id="myPostsPager" class="d-none mt-4" aria-label="分页">
                        <ul class="pagination pagination-sm justify-content-center mb-0" id="myPostsPagerInner"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/profile.js?v=5.2"></script>
    <script src="/js/profile-posts.js?v=4.5"></script>
</body>
</html>
