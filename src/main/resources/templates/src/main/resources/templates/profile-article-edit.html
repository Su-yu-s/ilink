<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编写文章 - iLink</title>
    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="/css/md-editor.css?v=1.0" rel="stylesheet">
</head>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.1" rel="stylesheet">
</head>
<body data-profile-page="posts" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <th:block th:replace="~{fragments/profile-sidebar :: sidebar (active='posts')}"/>

            <div class="il-profile-content">
                <div class="il-section-card">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title">编写文章</h2>
                            <p class="il-section-subtitle">撰写标题与正文，上传附件后保存发布</p>
                        </div>
                    </div>

                    <div class="profile-article-edit-body">
                        <div class="mb-3">
                            <label class="form-label">发布到分类</label>
                            <select class="form-select" id="editCategory"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">标题</label>
                            <input type="text" class="form-control" id="editTitle" maxlength="200" placeholder="一句话概括">
                        </div>
                        <div class="mb-3 community-compose-wrap">
                            <label class="form-label">正文（支持 Markdown）</label>
                            <!-- 富文本工具栏 -->
                            <div class="md-toolbar">
                                <button type="button" class="md-toolbar-btn" data-action="bold" title="粗体"><b>B</b></button>
                                <button type="button" class="md-toolbar-btn" data-action="italic" title="斜体"><i>I</i></button>
                                <button type="button" class="md-toolbar-btn" data-action="strikethrough" title="删除线"><s>S</s></button>
                                <button type="button" class="md-toolbar-btn" data-action="code" title="行内代码">&lt;/&gt;</button>
                                <span class="md-toolbar-sep"></span>
                                <button type="button" class="md-toolbar-btn" data-action="h2" title="二级标题">H2</button>
                                <button type="button" class="md-toolbar-btn" data-action="h3" title="三级标题">H3</button>
                                <span class="md-toolbar-sep"></span>
                                <button type="button" class="md-toolbar-btn" data-action="ul" title="无序列表"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
                                <button type="button" class="md-toolbar-btn" data-action="ol" title="有序列表"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 18h2l-2 3h2"/><path d="M5 12H3l1-2h1"/></svg></button>
                                <button type="button" class="md-toolbar-btn" data-action="quote" title="引用"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
                                <span class="md-toolbar-sep"></span>
                                <button type="button" class="md-toolbar-btn" data-action="link" title="插入链接"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
                                <button type="button" class="md-toolbar-btn" data-action="image" title="插入图片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
                                <button type="button" class="md-toolbar-btn" data-action="hr" title="分隔线">&mdash;</button>
                            </div>
                            <!-- 模式切换 -->
                            <div class="md-mode-bar" id="mdModeBar">
                                <button type="button" class="md-mode-btn active" data-mode="split" id="mdModeSplit">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
                                    分栏
                                </button>
                                <button type="button" class="md-mode-btn" data-mode="edit" id="mdModeEdit">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                                    编辑
                                </button>
                                <button type="button" class="md-mode-btn" data-mode="preview" id="mdModePreview">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    预览
                                </button>
                            </div>
                            <!-- 编辑 + 预览 -->
                            <div class="md-pane-wrap split" id="mdPaneWrap">
                                <div class="md-edit-pane" id="mdEditPane">
                                    <textarea id="mdEditor" placeholder="使用 Markdown 撰写正文…&#10;&#10;## 标题&#10;**粗体** *斜体* &#96;代码&#96;&#10;- 列表项&#10;> 引用&#10;&#10;[链接](url) ![图片](url)"></textarea>
                                </div>
                                <div class="md-divider visible" id="mdDivider"></div>
                                <div class="md-preview-pane" id="mdPreviewPane">
                                    <div class="markdown-body" id="mdPreview"></div>
                                </div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">附件（可选）</label>
                            <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                                <input type="file" id="editAttachmentInput" class="d-none" multiple>
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="editAddAttachmentBtn">上传文件</button>
                                <span class="small text-muted">最多 10 张</span>
                            </div>
                            <ul id="editAttachmentList" class="list-unstyled small mb-0 community-compose-attachments"></ul>
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <button type="button" class="btn btn-primary" id="editSaveBtn">保存文章</button>
                            <a href="/profile-posts.html" class="btn btn-outline-secondary">返回列表</a>
                            <a href="/community.html" class="btn btn-outline-primary" id="editPreviewLink" target="_blank" rel="noopener">预览公开页</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.2.0/marked.min.js" crossorigin="anonymous"></script>
    <script src="/js/profile-article-edit.js?v=5"></script>
</body>
</html>
