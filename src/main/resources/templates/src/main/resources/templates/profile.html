<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.0" rel="stylesheet">
</head>
<body data-profile-page="overview" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <!-- Sidebar -->
            <aside class="il-profile-sidebar">
                <h3 class="il-profile-sidebar-title">个人中心</h3>
                <p class="il-profile-sidebar-subtitle">资料与协作设置</p>
                <nav class="il-profile-nav">
                    <a th:href="@{/profile.html}" href="/profile.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'overview'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <span>个人概览</span>
                    </a>
                    <a th:href="@{/profile.html#teams}" href="/profile.html#teams"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'teams'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>我的团队</span>
                    </a>
                    <a th:href="@{/profile-edit.html}" href="/profile-edit.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'edit'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        <span>编辑资料</span>
                    </a>
                    <a th:href="@{/profile-honors.html}" href="/profile-honors.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'honors'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        <span>个人成果</span>
                    </a>
                    <a th:href="@{/profile-posts.html}" href="/profile-posts.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'posts'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        <span>我的文章</span>
                    </a>
                    <a th:href="@{/profile-favorites.html}" href="/profile-favorites.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'favorites'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>我的收藏</span>
                    </a>
                    <a th:href="@{/profile-password.html}" href="/profile-password.html"
                       class="il-profile-nav-item"
                       th:classappend="${active == 'password'} ? ' active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <span>修改密码</span>
                    </a>
                </nav>
            </aside>

            <!-- Content -->
            <div class="il-profile-content">
                <!-- Profile Card -->
                <div class="il-profile-card">
                    <div class="il-profile-avatar">
                        <img th:if="${currentUser.avatar != null && !currentUser.avatar.isEmpty()}"
                             th:src="${currentUser.avatar}"
                             th:alt="${currentUser.realName ?: currentUser.username}"
                             onerror="this.style.display='none'; this.parentElement.querySelector('.il-profile-avatar-fallback').style.display='flex';">
                        <span class="il-profile-avatar-fallback"
                              th:unless="${currentUser.avatar != null && !currentUser.avatar.isEmpty()}"
                              th:text="${currentUser.username != null && !currentUser.username.isEmpty() ? #strings.substring(currentUser.username, 0, 1) : '用'}">用</span>
                        <span class="il-profile-avatar-fallback"
                              th:if="${currentUser.avatar != null && !currentUser.avatar.isEmpty()}"
                              style="display:none;"
                              th:text="${currentUser.username != null && !currentUser.username.isEmpty() ? #strings.substring(currentUser.username, 0, 1) : '用'}">用</span>
                    </div>
                    <div class="il-profile-info">
                        <h1 class="il-profile-name" th:text="${currentUser.realName ?: currentUser.username}">用户</h1>
                        <span class="il-profile-role" th:text="${currentUser.role == 'TEACHER' ? '认证导师' : (currentUser.role == 'ADMIN' ? '管理员' : '学生')}">学生</span>
                        <div class="il-profile-meta">
                            <span class="il-profile-meta-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                                <span th:text="${currentUser.email ?: '未设置邮箱'}">邮箱</span>
                            </span>
                            <span class="il-profile-meta-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                    <circle cx="12" cy="10" r="3"/>
                                </svg>
                                <span id="profileInstitutionText" th:text="${currentUser.school ?: '未设置学校'}">学校</span>
                            </span>
                        </div>
                        <p class="il-profile-bio" th:text="${currentUser.bio ?: '还没有个人简介，去编辑一下吧~'}">个人简介</p>
                    </div>
                    <div class="il-profile-actions">
                        <a href="/profile-edit.html" class="il-btn il-btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            编辑资料
                        </a>
                    </div>
                </div>

                <section class="il-section-card il-teacher-summary" id="teacherProfileSummary" hidden aria-labelledby="teacherProfileSummaryTitle">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title" id="teacherProfileSummaryTitle">导师资料</h2>
                            <p class="il-section-subtitle">展示给学生的指导信息</p>
                        </div>
                        <a class="il-btn il-btn-primary" id="teacherProfileDetailLink" href="/teacher-wall.html">查看导师主页</a>
                    </div>
                    <dl class="il-teacher-summary__grid">
                        <div><dt>专业领域</dt><dd id="teacherSummaryExpertise">未设置</dd></div>
                        <div><dt>职称</dt><dd id="teacherSummaryTitle">未设置</dd></div>
                        <div><dt>研究方向</dt><dd id="teacherSummaryResearch">未设置</dd></div>
                        <div><dt>代表项目</dt><dd id="teacherSummaryProjects">未设置</dd></div>
                    </dl>
                </section>

                <!-- Activity Section -->
                <div class="il-section-card" id="activitySectionCard">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title" id="activitySectionTitle">我的活动</h2>
                            <p class="il-section-subtitle">管理你发布和申请的组队</p>
                        </div>
                    </div>

                    <div class="il-tabs" id="activityTabs">
                        <button class="il-tab active" id="tab-teams" type="button">我带领的队伍</button>
                        <button class="il-tab" id="tab-applications" type="button">我申请的队伍</button>
                    </div>

                    <div id="content-teams" class="il-tab-panel">
                        <div class="il-empty-state">
                            <div class="il-empty-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </div>
                            <p class="il-empty-title">还没有组队</p>
                            <p class="il-empty-text">去组队大厅看看，找到志同道合的伙伴</p>
                        </div>
                    </div>

                    <div id="content-applications" class="il-tab-panel" style="display: none;">
                        <div class="il-empty-state">
                            <div class="il-empty-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 12 14.01 9 11.01"/>
                                </svg>
                            </div>
                            <p class="il-empty-title">还没有申请</p>
                            <p class="il-empty-text">申请加入感兴趣的团队吧</p>
                        </div>
                    </div>

                    <div id="content-teams-joined" class="il-tab-panel" style="display: none;">
                        <div id="joinedTeamsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/profile.js?v=5.2"></script>
    <script>
(function() {
    function switchTab(tab) {
        var tabs = document.querySelectorAll('.il-tab');
        for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('content-teams').style.display = tab === 'teams' ? 'block' : 'none';
        document.getElementById('content-applications').style.display = tab === 'applications' ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
        var tabs = document.querySelectorAll('.il-tab');
        for (var i = 0; i < tabs.length; i++) {
            (function(tab) {
                tab.addEventListener('click', function() {
                    var tabName = this.id === 'tab-teams' ? 'teams' : 'applications';
                    switchTab(tabName);
                });
            })(tabs[i]);
        }

        // Hash-based navigation
        var navMap = { '#teams': '竞赛小队', '#': '招募活动' };
        var currentHash = window.location.hash || '#';
        var navItems = document.querySelectorAll('.il-profile-nav-item');
        navItems.forEach(function(item) { item.classList.remove('active'); });
        var targetLabel = navMap[currentHash];
        if (targetLabel) {
            navItems.forEach(function(item) {
                var span = item.querySelector('span');
                if (span && span.textContent === targetLabel) item.classList.add('active');
            });
        }

        if (currentHash === '#teams') {
            document.getElementById('activitySectionTitle').textContent = '我的小队';
            document.getElementById('activityTabs').style.display = 'none';
            document.getElementById('content-teams').style.display = 'none';
            document.getElementById('content-applications').style.display = 'none';
            document.getElementById('content-teams-joined').style.display = 'block';
            if (typeof renderJoinedTeams === 'function') renderJoinedTeams();
        }

        window.addEventListener('hashchange', function() {
            var hash = window.location.hash;
            navItems.forEach(function(item) { item.classList.remove('active'); });
            var label = navMap[hash];
            if (label) {
                navItems.forEach(function(item) {
                    var span = item.querySelector('span');
                    if (span && span.textContent === label) item.classList.add('active');
                });
            }
            if (hash === '#teams') {
                document.getElementById('activitySectionTitle').textContent = '我的小队';
                document.getElementById('activityTabs').style.display = 'none';
                document.getElementById('content-teams').style.display = 'none';
                document.getElementById('content-applications').style.display = 'none';
                document.getElementById('content-teams-joined').style.display = 'block';
                if (typeof renderJoinedTeams === 'function') renderJoinedTeams();
            } else {
                document.getElementById('activitySectionTitle').textContent = '我的活动';
                document.getElementById('activityTabs').style.display = 'flex';
                document.getElementById('content-teams-joined').style.display = 'none';
                document.getElementById('content-teams').style.display = 'block';
                document.getElementById('content-applications').style.display = 'none';
            }
        });
    });
})();
    </script>
</body>
</html>
