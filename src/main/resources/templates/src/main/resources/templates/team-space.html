<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队空间 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link rel="stylesheet" href="/css/team-space.css?v=18">
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link rel="stylesheet" href="/css/team-space-redesign.css?v=3.0">
</head>
<body data-app-page="team-space" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <main class="container main-content" aria-label="团队空间">
        <div class="team-warning" id="teamWarning" style="display:none;">
            <span class="team-warning-icon" aria-hidden="true">&#9888;</span>
            <div>
                <strong>团队还在招募中</strong>
                <p class="mb-0">队长确认组队后，任务协作和群聊会完整开放。</p>
            </div>
        </div>

        <div class="workspace-layout" id="workspaceLayout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                            <path d="M16 3.13a4 4 0 010 7.75"/>
                        </svg>
                        <span id="sidebarTeamName">团队空间</span>
                    </div>
                    <button class="sidebar-back-btn" type="button" onclick="window.history.back()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M19 12H5M12 19L5 12L12 5"/>
                        </svg>
                        返回
                    </button>
                </div>

                <nav class="sidebar-nav" id="sidebarNav" aria-label="团队空间导航">
                    <button class="sidebar-nav-item active" data-panel="kanban-panel" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        <span>任务协作</span>
                    </button>
                    <button class="sidebar-nav-item" data-panel="chat-panel" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                        </svg>
                        <span>群聊</span>
                    </button>
                    <button class="sidebar-nav-item" data-panel="members-panel" type="button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                            <path d="M16 3.13a4 4 0 010 7.75"/>
                        </svg>
                        <span>成员</span>
                    </button>

                    <div class="sidebar-members-card" id="sidebarMembersCard">
                        <div class="smc-avatars" id="smcAvatars"></div>
                        <div class="smc-info">
                            <span class="smc-status" id="smcStatus">组队中</span>
                            <span class="smc-deadline" id="smcDeadline">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                <span id="smcDeadlineText">-</span>
                            </span>
                        </div>
                    </div>
                </nav>
            </aside>

            <section class="main-content-area">
                <section class="workspace-panel active" id="kanban-panel" aria-labelledby="kanbanTitle">
                    <div class="panel-header">
                        <h1 class="panel-title" id="kanbanTitle">任务看板</h1>
                        <div class="panel-actions" id="kanbanActions">
                            <button class="btn btn-sm btn-primary" id="createTaskBtn" type="button" onclick="teamSpace.openCreateModal()" style="display:none!important">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M12 5V19M5 12H19"/>
                                </svg>
                                创建任务
                            </button>
                        </div>
                    </div>

                    <div class="kanban-board">
                        <div class="kanban-columns">
                            <div class="kanban-col col-todo" data-status="todo" ondragover="teamSpace.handleColDragOver(event)" ondragleave="teamSpace.handleColDragLeave(event)" ondrop="teamSpace.handleColDrop(event)">
                                <div class="kanban-col-header">
                                    <span class="kanban-col-label"><span class="col-dot col-dot-gray"></span>待办</span>
                                    <span class="kanban-col-count" id="todoCount">0</span>
                                </div>
                                <div class="kanban-col-list" id="todoList"></div>
                            </div>
                            <div class="kanban-col col-in-progress" data-status="in_progress" ondragover="teamSpace.handleColDragOver(event)" ondragleave="teamSpace.handleColDragLeave(event)" ondrop="teamSpace.handleColDrop(event)">
                                <div class="kanban-col-header">
                                    <span class="kanban-col-label"><span class="col-dot col-dot-blue"></span>进行中</span>
                                    <span class="kanban-col-count" id="inProgressCount">0</span>
                                </div>
                                <div class="kanban-col-list" id="inProgressList"></div>
                            </div>
                            <div class="kanban-col col-review" data-status="review" ondragover="teamSpace.handleColDragOver(event)" ondragleave="teamSpace.handleColDragLeave(event)" ondrop="teamSpace.handleColDrop(event)">
                                <div class="kanban-col-header">
                                    <span class="kanban-col-label"><span class="col-dot col-dot-orange"></span>待审核</span>
                                    <span class="kanban-col-count" id="reviewCount">0</span>
                                </div>
                                <div class="kanban-col-list" id="reviewList"></div>
                            </div>
                            <div class="kanban-col col-completed" data-status="completed" ondragover="teamSpace.handleColDragOver(event)" ondragleave="teamSpace.handleColDragLeave(event)" ondrop="teamSpace.handleColDrop(event)">
                                <div class="kanban-col-header">
                                    <span class="kanban-col-label"><span class="col-dot col-dot-green"></span>已完成</span>
                                    <span class="kanban-col-count" id="completedCount">0</span>
                                </div>
                                <div class="kanban-col-list" id="completedList"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="workspace-panel chat-window-panel" id="chat-panel" aria-labelledby="chatTitle">
                    <div class="panel-header">
                        <h1 class="panel-title" id="chatTitle">团队群聊</h1>
                    </div>
                    <div class="chat-messages-area" id="chatMessagesArea">
                        <div class="panel-loading">加载中...</div>
                    </div>
                    <div class="chat-composer">
                        <div class="chat-input-bar">
                            <textarea id="chatInput" placeholder="输入消息，Enter 发送..." rows="3" onkeydown="teamSpace.handleChatKeyDown(event)" oninput="teamSpace.autoResizeChatInput(this)"></textarea>
                            <button class="chat-send-btn" id="chatSendBtn" type="button" onclick="teamSpace.sendChatMessage()">发送</button>
                        </div>
                    </div>
                </section>

                <section class="workspace-panel" id="members-panel" aria-labelledby="membersTitle">
                    <div class="panel-header">
                        <h1 class="panel-title" id="membersTitle">团队成员</h1>
                    </div>
                    <div class="members-list-area" id="membersListArea">
                        <div class="panel-loading">加载中...</div>
                    </div>
                </section>
            </section>
        </div>
    </main>

    <div class="modal fade" id="createTaskModal" tabindex="-1" aria-labelledby="createTaskTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5" id="createTaskTitle">创建新任务</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" for="newTaskTitle">任务标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="newTaskTitle" placeholder="请输入任务标题" maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="newTaskDesc">任务描述</label>
                        <textarea class="form-control" id="newTaskDesc" rows="3" placeholder="说明任务目标、交付物和验收标准" maxlength="2000"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="newTaskAssignee">负责人 <span class="text-danger">*</span></label>
                        <select class="form-select" id="newTaskAssignee">
                            <option value="">选择负责人</option>
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label" for="newTaskType">任务类型</label>
                            <select class="form-select" id="newTaskType">
                                <option value="development">开发</option>
                                <option value="design">设计</option>
                                <option value="testing">测试</option>
                                <option value="documentation">文档</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="newTaskPriority">优先级</label>
                            <select class="form-select" id="newTaskPriority">
                                <option value="1">低</option>
                                <option value="2" selected>中</option>
                                <option value="3">高</option>
                                <option value="4">紧急</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label" for="newTaskDeadline">截止日期</label>
                            <input type="datetime-local" class="form-control" id="newTaskDeadline">
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="newTaskHours">预计工时</label>
                            <input type="number" class="form-control" id="newTaskHours" placeholder="0" min="0" step="0.5">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="teamSpace.createTask()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="taskDetailModal" tabindex="-1" aria-labelledby="detailTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5" id="detailTitle">任务详情</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <p id="detailDesc" class="mb-3" style="line-height:1.6;"></p>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <small class="text-secondary">状态</small>
                            <div id="detailStatus"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <small class="text-secondary">优先级</small>
                            <div id="detailPriority"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <small class="text-secondary">类型</small>
                            <div id="detailType"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <small class="text-secondary">负责人</small>
                            <div id="detailAssignee"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <small class="text-secondary">截止日期</small>
                            <div id="detailDeadline"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <small class="text-secondary">创建时间</small>
                            <div id="detailCreatedAt"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" id="detailFooter">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/team-space.js?v=27"></script>
</body>
</html>
