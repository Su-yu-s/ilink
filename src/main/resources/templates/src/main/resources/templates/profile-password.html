<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.0" rel="stylesheet">
</head>
<body data-profile-page="password" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <div th:replace="~{fragments/profile-sidebar :: sidebar (active='password')}"></div>

            <div class="il-profile-content">
                <div class="il-section-card">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title">修改密码</h2>
                            <p class="il-section-subtitle">定期更换密码有助于保护账号安全</p>
                        </div>
                    </div>

                    <form id="passwordForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label">旧密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-form-input" id="oldPassword" autocomplete="current-password" required placeholder="请输入当前密码">
                                <div class="invalid-feedback">请输入旧密码</div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">新密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-form-input" id="newPassword" autocomplete="new-password" required minlength="8" placeholder="至少 8 个字符（需含大小写字母和数字）">
                                <div class="invalid-feedback">新密码至少需要 8 个字符</div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-form-input" id="confirmPassword" autocomplete="new-password" required minlength="8" placeholder="再次输入新密码">
                                <div class="invalid-feedback">两次输入的密码不一致</div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-4 pt-4 mt-4" style="border-top: 1px solid var(--pf-border);">
                            <button type="submit" class="il-btn il-btn-primary" id="passwordSubmitBtn">确认修改</button>
                            <p class="mb-0 text-muted" style="font-size: 13px;">修改成功后需要重新登录。</p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.3"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/profile.js?v=5.2"></script>
    <script src="/js/profile-password.js?v=4.3"></script>
</body>
</html>
