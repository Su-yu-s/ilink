<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成果展示 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/gallery.css?v=4.4" rel="stylesheet">
    <link href="/css/search-bar.css?v=1.7" rel="stylesheet">
    <link href="/css/asset-publish.css?v=1.0" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="/css/md-editor.css?v=1.0" rel="stylesheet">
    <style>
        /* publishBtn 右对齐 */
        body[data-app-page="gallery"] .il-toolbar-inner #publishBtn {
            margin-left: auto !important;
        }
    </style>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/portal-redesign.css?v=1.1" rel="stylesheet">
</head>
<body data-app-page="gallery" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'gallery')"></div>

    <main class="il-page-wrapper" id="mainContent">
        <!-- Hero -->
        <section class="il-hero" aria-labelledby="galleryTitle">
            <div class="il-hero__badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                成果展示 · 项目沉淀
            </div>
            <h1 class="il-hero__title" id="galleryTitle">成果展示</h1>
            <p class="il-hero__desc">浏览和发布竞赛成果、科研项目与学术荣誉。</p>
        </section>

        <!-- Filter Bar -->
        <section class="il-search-bar" aria-label="成果筛选">
            <div th:replace="~{fragments/search-field :: field('keyword', '搜索成果名称、描述…', '搜索成果', 'search', 'il-search-bar__input-wrap il-search-field--toolbar')}"></div>

            <div class="il-search-bar__select">
                <select id="category" aria-label="分类">
                    <option value="">全部分类</option>
                    <option value="竞赛获奖">竞赛获奖</option>
                    <option value="论文发表">论文发表</option>
                    <option value="科研项目">科研项目</option>
                    <option value="作品项目">作品 / 项目</option>
                    <option value="荣誉称号">荣誉称号</option>
                    <option value="奖学金">奖学金</option>
                </select>
            </div>

            <div class="il-search-bar__select">
                <select id="sort" aria-label="排序">
                    <option value="latest">最新发布</option>
                    <option value="popular">最多浏览</option>
                </select>
            </div>

            <button type="button" class="il-search-bar__btn il-search-bar__btn--primary" id="searchBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                搜索
            </button>

            <div class="il-search-bar__spacer"></div>

            <button type="button" class="il-search-bar__btn il-search-bar__btn--ghost" onclick="GalleryApp.openPublish()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                发布成果
            </button>
        </section>

        <!-- Card Grid -->
        <section id="listContainer" aria-live="polite"></section>

        <!-- Pagination -->
        <nav id="pagination" aria-label="成果分页"></nav>
    </main>

    <div th:replace="fragments/asset-publish-modal :: modal"></div>
    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.2.0/marked.min.js" crossorigin="anonymous"></script>
    <script src="/js/asset-publish.js?v=2.0"></script>
    <script src="/js/gallery.js?v=5.9"></script>
</body>
</html>
