<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交流社区 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/community-feed.css?v=4.5" rel="stylesheet">
    <link href="/css/search-bar.css?v=1.7" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        /* iLink 交流社区专用样式 */
        body[data-app-page="community"] .il-hero__eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            background: var(--ui-surface-subtle);
            border: 1px solid var(--ui-border);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ui-text-muted);
            margin-bottom: 16px;
        }
        body[data-app-page="community"] .il-hero__eyebrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        body[data-app-page="community"] .il-hero__title { font-family: var(--ui-font, sans-serif); font-weight: 650; max-width: 640px; }
        body[data-app-page="community"] .il-hero__desc { font-size: 16px; color: var(--text-secondary); max-width: 520px; margin: 16px 0 0; }
        body[data-app-page="community"] .il-btn--sm { font-size: 13px; }
    </style>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/portal-redesign.css?v=1.1" rel="stylesheet">
</head>
<body data-app-page="community" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'community')"></div>

    <div class="il-page-wrapper">
        <canvas id="particleCanvas" class="particle-canvas"></canvas>

        <div class="il-hero">
            <div class="il-hero__eyebrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                经验分享 · 竞赛协作
            </div>
            <h1 class="il-hero__title">交流社区</h1>
            <p class="il-hero__desc">沉淀赛程复盘、备赛方法、工程经验与可复用资源。</p>
        </div>

        <div class="il-search-bar">
            <div class="il-search-bar__tags" id="channelTabs">
                <button type="button" class="il-search-bar__tag active" data-category="">全部</button>
                <button type="button" class="il-search-bar__tag" data-category="general">综合</button>
                <button type="button" class="il-search-bar__tag" data-category="tech">技术</button>
                <button type="button" class="il-search-bar__tag" data-category="competition">竞赛</button>
                <button type="button" class="il-search-bar__tag" data-category="resource">资源</button>
            </div>

            <div th:replace="~{fragments/search-field :: field('keywordInput', '搜索标题或正文…', '搜索社区帖子', 'search', 'il-search-bar__input-wrap il-search-field--toolbar')}"></div>

            <button type="button" class="il-search-bar__btn il-search-bar__btn--primary" id="openComposeBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                写文章
            </button>

            <button type="button" class="il-search-bar__btn il-search-bar__btn--secondary" id="refreshBtn">刷新</button>
        </div>

        <div id="postList">
            <div class="il-empty-state">
                <p>正在加载文章列表…</p>
            </div>
        </div>

        <nav id="postPager" class="d-none" aria-label="分页">
            <ul class="pagination justify-content-center mb-0" id="postPagerInner"></ul>
        </nav>
    </div>

    <div class="il-modal-overlay" id="composeModal" aria-hidden="true" onclick="if(event.target === this) closeComposeModal()">
        <div class="il-modal" onclick="event.stopPropagation()">
            <div class="il-modal-header">
                <h5 class="il-modal-title">写文章</h5>
                <button class="il-modal-close" onclick="closeComposeModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="il-modal-body">
                <div class="il-form-group">
                    <label class="il-form-label">发布到分类</label>
                    <select class="il-form-select" id="composeCategory"></select>
                </div>
                <div class="il-form-group">
                    <label class="il-form-label">标题</label>
                    <input type="text" class="il-form-input" id="composeTitle" maxlength="200" placeholder="一句话概括，方便他人检索">
                </div>
                <div class="il-form-group">
                    <label class="il-form-label">正文</label>
                    <div id="composeEditor" style="background: var(--ui-surface); border-radius: 8px; border: 1px solid var(--ui-border);"></div>
                    <p class="form-text small text-muted mb-0 mt-2">支持排版、链接；工具栏「图片」可插入正文配图（自动上传）。</p>
                </div>
                <div class="il-form-group" style="margin-bottom: 0;">
                    <label class="il-form-label">附件（可选）</label>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                        <input type="file" id="composeAttachmentInput" class="d-none" multiple>
                        <button type="button" class="il-btn il-btn-secondary il-btn--sm" id="composeAddAttachmentBtn">上传文件</button>
                        <span class="small text-muted">与正文一并发布，最多 10 个</span>
                    </div>
                    <ul id="composeAttachmentList" class="list-unstyled small mb-0"></ul>
                </div>
            </div>
            <div class="il-modal-footer">
                <button type="button" class="il-btn il-btn-secondary" onclick="closeComposeModal()">取消</button>
                <button type="button" class="il-btn il-btn-primary" id="submitPostBtn">发布</button>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/ui-particles.js?v=1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" crossorigin="anonymous"></script>
    <script src="/js/community.js?v=4.9"></script>
</body>
</html>
