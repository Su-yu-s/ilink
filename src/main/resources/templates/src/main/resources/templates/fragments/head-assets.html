<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  全站样式入口。用法：
  <head th:replace="fragments/head-assets :: core"></head>
  或带 Bootstrap：
  <head th:replace="fragments/head-assets :: core(bootstrap=true)"></head>
-->
<th:block th:fragment="core(bootstrap)">
    <link rel="icon" type="image/svg+xml" sizes="any" th:href="@{/favicon.svg(v=5)}" href="/favicon.svg?v=5">
    <!-- 字体使用系统默认：宋体（古诗词/标题）、微软雅黑（正文）、Times New Roman（西文）-->
    <link th:if="${bootstrap}" href="/lib/bootstrap.min.css" rel="stylesheet">
    <link href="/css/design-tokens.css?v=7.9" rel="stylesheet">
    <link href="/css/effects.css?v=7.11" rel="stylesheet">
    <link href="/css/components.css?v=8.9" rel="stylesheet">
    <link href="/css/layout.css?v=7.8" rel="stylesheet">
    <link href="/css/profile.css?v=9.5" rel="stylesheet">
    <link href="/css/pages.css?v=1.0" rel="stylesheet">
    <link href="/css/style.css?v=13.8" rel="stylesheet">
    <link href="/css/home.css?v=4.4" rel="stylesheet">
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
</th:block>

<th:block th:fragment="auth">
    <link rel="icon" type="image/svg+xml" sizes="any" th:href="@{/favicon.svg(v=5)}" href="/favicon.svg?v=5">
    <!-- 字体使用系统默认：宋体（古诗词/标题）、微软雅黑（正文）、Times New Roman（西文）-->
    <link href="/css/design-tokens.css?v=7.9" rel="stylesheet">
    <link href="/css/effects.css?v=7.11" rel="stylesheet">
    <link href="/css/components.css?v=8.9" rel="stylesheet">
    <link href="/css/layout.css?v=7.8" rel="stylesheet">
    <link href="/css/auth.css?v=8.3" rel="stylesheet">
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
</th:block>

<!-- Must be inserted after page-specific styles when a page has them. -->
<th:block th:fragment="redesign">
    <link href="/css/app-redesign.css?v=1.2" rel="stylesheet">
</th:block>
</body>
</html>
