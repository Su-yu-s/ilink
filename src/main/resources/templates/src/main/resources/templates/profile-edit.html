<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑资料 - iLink</title>
    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.1" rel="stylesheet">
</head>
<body data-profile-page="edit" th:data-user-id="${currentUser?.id}" class="ilink-page-bg">
    <input type="file" id="avatarFileInput" class="d-none" accept="image/jpeg,image/png,image/gif,image/webp">

    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <div th:replace="~{fragments/profile-sidebar :: sidebar (active='edit')}"></div>

            <div class="il-profile-content">
                <div class="il-section-card">
                    <form id="profileForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="il-section-header" style="margin-bottom: 24px;">
                            <div>
                                <h2 class="il-section-title">基本信息</h2>
                                <p class="il-section-subtitle">完善个人资料，让更多人了解你</p>
                            </div>
                        </div>

                        <div class="il-avatar-wrapper">
                            <div class="il-avatar-container il-avatar-preview" id="avatarContainer" title="点击更换头像">
                                <img src="" alt="" class="il-avatar-img il-avatar-img--hidden" id="avatarPreviewImg">
                                <div class="il-avatar-fallback il-avatar-fallback--hidden" id="avatarFallback" aria-hidden="true"></div>
                                <div class="il-avatar-overlay">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="il-avatar-hint">
                                点击头像更换
                                <span>支持 JPG / PNG / GIF / WebP</span>
                            </div>
                            <input type="hidden" id="avatar" value="">
                            <span class="il-avatar-upload-hint" id="avatarUploadHint"></span>
                        </div>

                        <div class="il-form-row">
                            <div class="il-form-group">
                                <label class="il-form-label il-form-label--required" for="username">用户名</label>
                                <input type="text" class="il-form-input" id="username" autocomplete="username" maxlength="64" required placeholder="请输入用户名">
                            </div>
                            <div class="il-form-group">
                                <label class="il-form-label il-form-label--required" for="email">邮箱</label>
                                <input type="email" class="il-form-input" id="email" required autocomplete="email" placeholder="name@example.com">
                            </div>
                        </div>

                        <div class="il-form-row">
                            <div class="il-form-group">
                                <label class="il-form-label" for="realName">姓名</label>
                                <input type="text" class="il-form-input" id="realName" autocomplete="name" placeholder="选填">
                            </div>
                            <div class="il-form-group">
                                <label class="il-form-label" id="schoolLabel" for="school">学校</label>
                                <input type="text" class="il-form-input" id="school" maxlength="128" placeholder="例如：南京晓庄学院">
                            </div>
                        </div>

                        <div class="il-form-row">
                            <div class="il-form-group">
                                <label class="il-form-label" id="majorLabel" for="major">专业</label>
                                <input type="text" class="il-form-input" id="major" maxlength="64" placeholder="例如：软件工程">
                            </div>
                            <div class="il-form-group" id="studentGradeGroup">
                                <label class="il-form-label" for="grade">年级</label>
                                <input type="text" class="il-form-input" id="grade" maxlength="32" placeholder="例如：2023级">
                            </div>
                        </div>

                        <div class="il-form-row">
                            <div class="il-form-group">
                                <label class="il-form-label" id="collegeLabel" for="college">学院</label>
                                <input type="text" class="il-form-input" id="college" maxlength="128" placeholder="例如：信息工程学院">
                            </div>
                            <div class="il-form-group">
                                <label class="il-form-label" for="gender">性别</label>
                                <select class="il-form-select" id="gender">
                                    <option value="">不展示</option>
                                    <option value="MALE">男</option>
                                    <option value="FEMALE">女</option>
                                    <option value="OTHER">其他</option>
                                </select>
                            </div>
                        </div>

                        <div class="il-form-group">
                            <label class="il-form-label" for="bio">个人简介</label>
                            <textarea class="il-form-input" id="bio" maxlength="300" placeholder="介绍一下自己吧"></textarea>
                        </div>

                        <section class="il-teacher-profile-fields" id="teacherProfileFields" hidden aria-labelledby="teacherProfileHeading">
                            <div class="il-section-title il-section-divider" id="teacherProfileHeading">导师资料</div>
                            <p class="il-section-subtitle">这些信息会同步展示在导师招贤与导师详情页。</p>
                            <div class="il-form-row">
                                <div class="il-form-group">
                                    <label class="il-form-label" for="professionalTitle">职称</label>
                                    <input type="text" class="il-form-input" id="professionalTitle" maxlength="100" placeholder="例如：教授、副教授、讲师">
                                </div>
                                <div class="il-form-group">
                                    <label class="il-form-label" for="teacherResearch">研究方向</label>
                                    <input type="text" class="il-form-input" id="teacherResearch" maxlength="500" placeholder="例如：人工智能、软件工程">
                                </div>
                            </div>
                            <div class="il-form-group">
                                <label class="il-form-label" for="teacherIntroduction">导师简介</label>
                                <textarea class="il-form-input" id="teacherIntroduction" maxlength="2000" placeholder="介绍教学、科研或竞赛指导经验"></textarea>
                            </div>
                            <div class="il-form-group">
                                <label class="il-form-label" for="teacherProjects">代表项目</label>
                                <textarea class="il-form-input" id="teacherProjects" maxlength="3000" placeholder="选填，可列出代表项目、论文或指导成果"></textarea>
                            </div>
                        </section>

                        <h2 class="il-section-title il-section-divider">技能标签</h2>

                        <div class="il-skills-list" id="skillsTagsWrapper"></div>

                        <div class="il-skill-form">
                            <div class="il-form-group il-form-group--compact">
                                <input type="text" class="il-form-input" id="skillName" maxlength="64" placeholder="技能名称">
                            </div>
                            <div class="il-form-group il-form-group--compact">
                                <select class="il-form-select" id="skillCategory">
                                    <option value="">分类</option>
                                    <option value="programming">编程语言</option>
                                    <option value="frontend">前端技术</option>
                                    <option value="backend">后端技术</option>
                                    <option value="database">数据库</option>
                                    <option value="devops">DevOps</option>
                                    <option value="mobile">移动开发</option>
                                    <option value="ai">人工智能</option>
                                    <option value="design">设计</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                            <div class="il-form-group il-form-group--compact">
                                <select class="il-form-select" id="skillLevel">
                                    <option value="">熟练度</option>
                                    <option value="1">入门</option>
                                    <option value="2">初级</option>
                                    <option value="3">中级</option>
                                    <option value="4">高级</option>
                                    <option value="5">专家</option>
                                </select>
                            </div>
                            <button type="button" class="il-btn il-btn-primary il-btn-sm" id="addSkillBtn">添加</button>
                        </div>

                        <h2 class="il-section-title il-section-divider">个人奖项</h2>
                        <p class="il-section-subtitle" style="margin-bottom:12px;">添加或编辑后在列表中管理；修改后请保存同步到账户</p>

                        <div id="honorsListSection" class="il-honors-list">
                            <div id="honorsBatchManageBar" class="il-honors-batch-bar">
                                <label class="il-honors-batch-bar__select">
                                    <input type="checkbox" id="checkAll" class="il-honors-batch-bar__checkbox">
                                    <span class="il-honors-batch-bar__label">已选 <strong id="count">0</strong> 条</span>
                                </label>
                                <button type="button" class="il-btn il-btn-danger il-btn-sm" id="btnDel" disabled>删除选中</button>
                            </div>
                            <div id="honorsEditor" class="il-honors-editor">
                                <p class="il-honors-loading">加载中…</p>
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
                            <button type="button" class="il-btn il-btn-ghost il-btn-sm" id="btnManage">管理奖项</button>
                            <button type="button" class="il-btn il-btn-primary il-btn-sm" id="btnAdd">+ 添加奖项</button>
                            <button type="button" class="il-btn il-btn-primary il-btn-sm" id="btnSave" style="margin-left:auto;">保存奖项</button>
                        </div>

                        <div class="il-form-footer">
                            <button type="submit" class="il-btn il-btn-primary" id="profileSaveBtn">保存资料</button>
                            <p class="il-form-hint">修改将在保存后生效</p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑奖项弹窗 -->
    <div class="modal fade il-bs-form-modal" id="honorModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title" id="modalTitle">添加奖项</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="hid">
                    <div class="il-field">
                        <label class="il-label" for="selType">奖项类型 <span class="il-label-required">*</span></label>
                        <select class="il-select" id="selType">
                            <option value="competition">竞赛获奖</option>
                            <option value="scholarship">奖学金</option>
                            <option value="honor">荣誉称号</option>
                            <option value="paper">论文发表</option>
                            <option value="research">科研项目</option>
                            <option value="work">作品 / 项目</option>
                            <option value="other">其他成果</option>
                        </select>
                    </div>
                    <div class="il-field">
                        <label class="il-label" for="txtTitle"><span id="lblTitle">名称</span> <span class="il-label-required">*</span></label>
                        <input type="text" class="il-input" id="txtTitle" placeholder="请输入奖项名称">
                    </div>
                    <div class="honors-section" data-section="competition">
                        <div class="il-field-row">
                            <div class="il-field">
                                <label class="il-label" for="selRank">获奖等级</label>
                                <select class="il-select" id="selRank">
                                    <option value="">未指定</option><option value="特等奖">特等奖</option><option value="一等奖">一等奖</option>
                                    <option value="二等奖">二等奖</option><option value="三等奖">三等奖</option><option value="优秀奖">优秀奖</option>
                                </select>
                            </div>
                            <div class="il-field">
                                <label class="il-label" for="selTeam">参赛形式</label>
                                <select class="il-select" id="selTeam">
                                    <option value="">未指定</option><option value="TEAM">团队</option><option value="INDIVIDUAL">个人</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="honors-section" data-section="competition scholarship honor paper research work other">
                        <div class="il-field">
                            <label class="il-label" for="selLevel">级别（可选）</label>
                            <select class="il-select" id="selLevel">
                                <option value="">未指定</option><option value="school">校级</option><option value="provincial">省级</option>
                                <option value="national">国家级</option><option value="international">国际级</option><option value="other">其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="il-field-row">
                        <div class="il-field"><label class="il-label" for="txtMonth">时间</label><input type="month" class="il-input" id="txtMonth"></div>
                        <div class="il-field"><label class="il-label" for="txtPeriod">时间说明（可选）</label><input type="text" class="il-input" id="txtPeriod" placeholder="如：2024–2026 学年"></div>
                    </div>
                    <div class="il-field"><label class="il-label" for="txtIssuer">颁奖 / 主办 / 单位</label><input type="text" class="il-input" id="txtIssuer" placeholder="单位或组织名称"></div>
                    <div class="il-field">
                        <label class="il-label">证明材料</label>
                        <p class="il-honors-proof-hint">支持 PDF、JPG、PNG，最大 2MB；可粘贴链接或上传</p>
                        <div id="proofPreviewBox" class="d-none" style="margin-bottom:8px;">
                            <div class="honors-preview-card__proof" style="width:88px;height:88px;max-width:88px;max-height:88px;overflow:hidden;border-radius:8px;border:1px solid var(--pf-border);background:var(--pf-border-light);">
                                <a id="proofPreviewLink" class="honors-preview-proof--image" href="#" target="_blank" rel="noopener" style="display:block;">
                                    <img id="proofPreviewImg" class="honors-preview-proof__img" src="" alt="证明材料预览" style="width:88px;height:88px;object-fit:cover;">
                                </a>
                            </div>
                        </div>
                        <div id="proofPdfIndicator" class="d-none" style="margin-bottom:8px;padding:10px 12px;background:var(--pf-border-light);border:1px solid var(--pf-border);border-radius:8px;">
                            <span style="font-size:13px;font-weight:var(--font-weight-semibold);color:var(--pf-text);">PDF 证明文件</span>
                        </div>
                        <input type="url" class="il-input" id="txtProofUrl" placeholder="https://..." data-honors-proof-bound="1">
                        <div class="il-dropzone" id="dropzone">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            <p class="il-dropzone__text">拖拽文件到此处，或点击选择</p>
                            <input type="file" id="fileProof" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf,.pdf" class="d-none">
                            <span class="il-dropzone__status" id="proofStatus"></span>
                        </div>
                    </div>
                    <div class="il-field"><label class="il-label" for="txtDetail">详细说明（可选）</label><textarea class="il-input" id="txtDetail" rows="3" placeholder="赛项全称、团队分工、项目简介等"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="il-btn il-btn-ghost" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="il-btn il-btn-ghost" id="btnSaveMore">保存并继续添加</button>
                    <button type="button" class="il-btn il-btn-primary" id="btnModalSave">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.3"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/profile.js?v=5.2"></script>
    <script src="/js/profile-edit.js?v=4.7"></script>
    <script src="/js/profile-honors.js?v=1.0"></script>
</body>
</html>
