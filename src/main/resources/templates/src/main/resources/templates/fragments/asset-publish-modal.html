<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">
    <div class="modal fade il-bs-form-modal il-asset-publish-modal" id="assetPublishModal" tabindex="-1" aria-labelledby="assetPublishModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="il-bs-form-modal__title" id="assetPublishModalTitle">发布成果</h5>
                    <button type="button" class="btn-close il-bs-form-modal__close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <p class="il-asset-publish-modal__intro">
                        填写内容与详情页展示一致：左侧为<strong>成果描述</strong>，空行后的内容为<strong>竞赛心得</strong>（选填）。支持 Markdown 格式。
                    </p>
                    <div class="il-bs-form-modal__field">
                        <label class="il-bs-form-modal__label" for="pubTitle">成果名称 <span class="il-bs-form-modal__req" aria-hidden="true">*</span></label>
                        <input type="text" class="form-control il-bs-form-modal__control" id="pubTitle" placeholder="请输入成果名称" maxlength="120">
                    </div>
                    <div class="il-bs-form-modal__field">
                        <label class="il-bs-form-modal__label" for="pubCategory">分类</label>
                        <select class="form-select il-bs-form-modal__control" id="pubCategory">
                            <option value="竞赛获奖">竞赛获奖</option>
                            <option value="技术创新">技术创新</option>
                            <option value="论文发表">论文发表</option>
                            <option value="科研项目">科研项目</option>
                            <option value="作品项目">作品 / 项目</option>
                            <option value="荣誉称号">荣誉称号</option>
                            <option value="奖学金">奖学金</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="il-bs-form-modal__field">
                        <label class="il-bs-form-modal__label" for="pubDescLead">成果描述</label>
                        <div class="md-mode-bar" data-group="desc">
                            <button type="button" class="md-mode-btn active" data-mode="split">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
                                分栏
                            </button>
                            <button type="button" class="md-mode-btn" data-mode="edit">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                                编辑
                            </button>
                            <button type="button" class="md-mode-btn" data-mode="preview">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                预览
                            </button>
                        </div>
                        <div class="md-pane-wrap split" id="pubDescPaneWrap">
                            <div class="md-edit-pane">
                                <textarea id="pubDescLead" placeholder="简要说明成果内容，支持 Markdown 格式"></textarea>
                            </div>
                            <div class="md-divider visible"></div>
                            <div class="md-preview-pane">
                                <div class="markdown-body" id="pubDescPreview"></div>
                            </div>
                        </div>
                    </div>
                    <div class="il-bs-form-modal__field">
                        <label class="il-bs-form-modal__label" for="pubInsight">竞赛心得 <span class="il-asset-publish-modal__optional">选填</span></label>
                        <div class="md-mode-bar" data-group="insight">
                            <button type="button" class="md-mode-btn active" data-mode="split">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
                                分栏
                            </button>
                            <button type="button" class="md-mode-btn" data-mode="edit">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                                编辑
                            </button>
                            <button type="button" class="md-mode-btn" data-mode="preview">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                预览
                            </button>
                        </div>
                        <div class="md-pane-wrap split" id="pubInsightPaneWrap">
                            <div class="md-edit-pane">
                                <textarea id="pubInsight" placeholder="参赛经历、团队协作、复盘总结等，支持 Markdown 格式"></textarea>
                            </div>
                            <div class="md-divider visible"></div>
                            <div class="md-preview-pane">
                                <div class="markdown-body" id="pubInsightPreview"></div>
                            </div>
                        </div>
                    </div>
                    <div class="il-bs-form-modal__field">
                        <label class="il-bs-form-modal__label" for="pubFile">附件 <span class="il-asset-publish-modal__optional">选填</span></label>
                        <input type="file" class="form-control il-bs-form-modal__control il-asset-publish-modal__file" id="pubFile">
                        <p class="il-asset-publish-modal__hint" id="pubFileHint">支持 PDF、ZIP、图片等，便于他人下载参考。</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="il-btn il-btn-ghost" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="il-btn il-btn-primary" id="assetPublishSubmitBtn">发布成果</button>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
