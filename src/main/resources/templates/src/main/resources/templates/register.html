<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - iLink</title>
    <th:block th:replace="fragments/head-assets :: auth"></th:block>
</head>
<body class="auth-page--register">
    <div class="floating-shapes" aria-hidden="true">
        <div class="shape shape--1"></div>
        <div class="shape shape--2"></div>
        <div class="shape shape--3"></div>
        <div class="shape shape--4"></div>
        <div class="shape shape--5"></div>
    </div>

    <!-- Auth Card -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="brand-logo">
                <div class="brand-logo__icon">iL</div>
            </div>

            <!-- Header -->
            <div class="auth-card__header">
                <h1 class="auth-card__title">创建账号</h1>
                <p class="auth-card__subtitle">加入 iLink，开启竞赛之旅</p>
            </div>

            <!-- Form -->
            <form id="registerForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <!-- 身份选择 -->
                <div class="form-group">
                    <label>身份</label>
                    <div class="identifier-toggle">
                        <button type="button" class="identifier-toggle__btn active" data-identity="student" id="toggleStudent" onclick="switchIdentity('STUDENT')">学生</button>
                        <button type="button" class="identifier-toggle__btn" data-identity="teacher" id="toggleTeacher" onclick="switchIdentity('TEACHER')">教师</button>
                    </div>
                    <div class="error-message il-field-hint" id="identityError"></div>
                </div>

                <!-- Identifier Type Toggle -->
                <div class="form-group">
                    <label id="identifierGroupLabel">手机号 / 学号</label>
                    <div class="identifier-toggle">
                        <button type="button" class="identifier-toggle__btn active" id="togglePhone" onclick="switchIdentifierType('phone')">手机号注册</button>
                        <button type="button" class="identifier-toggle__btn" id="toggleStudentId" onclick="switchIdentifierType('studentId')">学号注册</button>
                    </div>
                    <div class="input-wrapper" id="phoneWrapper">
                        <input type="tel" id="phone" name="phone"
                               placeholder="请输入手机号" autocomplete="tel">
                    </div>
                    <div class="input-wrapper" id="studentIdWrapper" style="display:none;">
                        <input type="text" id="studentId" name="studentId"
                               placeholder="请输入学号">
                    </div>
                    <div class="error-message il-field-hint" id="identifierError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password"
                               placeholder="8-32位，含字母和数字" required minlength="8" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', 'eyeIcon1', 'eyeOffIcon1')" aria-label="显示/隐藏密码">
                            <svg id="eyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message il-field-hint" id="passwordError"></div>
                </div>

                <!-- 确认密码 -->
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               placeholder="请再次输入密码" required minlength="8" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', 'eyeIcon2', 'eyeOffIcon2')" aria-label="显示/隐藏密码">
                            <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message il-field-hint" id="confirmPasswordError"></div>
                </div>

                <!-- Agreement -->
                <div class="agreement-wrapper">
                    <input type="checkbox" id="agreement" name="agreement" required>
                    <span>我已阅读并同意 <a href="/terms.html" target="_blank" class="il-link" rel="noopener">用户协议</a> 和 <a href="/privacy.html" target="_blank" class="il-link" rel="noopener">隐私政策</a></span>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">注册</button>

                <div id="errorMessage" class="alert"></div>
            </form>

            <!-- Footer -->
            <div class="auth-card__footer">
                已有账号？<a href="/login" class="il-link">立即登录</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js?v=8.2"></script>
    <script src="/js/register.js?v=7.4"></script>
    <script>        /* === Password visibility toggle === */
        function togglePasswordVisibility(inputId, eyeId, eyeOffId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeId);
            const eyeOffIcon = document.getElementById(eyeOffId);
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                input.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }

        /* === Identifier type toggle (phone / studentId) === */
        let currentIdentifierType = 'phone';

        function switchIdentifierType(type) {
            currentIdentifierType = type;
            const phoneWrapper = document.getElementById('phoneWrapper');
            const studentIdWrapper = document.getElementById('studentIdWrapper');
            const togglePhone = document.getElementById('togglePhone');
            const toggleStudentId = document.getElementById('toggleStudentId');

            if (type === 'phone') {
                phoneWrapper.style.display = 'block';
                studentIdWrapper.style.display = 'none';
                togglePhone.classList.add('active');
                toggleStudentId.classList.remove('active');
                document.getElementById('phone').setAttribute('required', 'required');
                document.getElementById('studentId').removeAttribute('required');
            } else {
                phoneWrapper.style.display = 'none';
                studentIdWrapper.style.display = 'block';
                togglePhone.classList.remove('active');
                toggleStudentId.classList.add('active');
                document.getElementById('studentId').setAttribute('required', 'required');
                document.getElementById('phone').removeAttribute('required');
            }
        }

        /* === Identity type toggle (student / teacher) === */
        window.currentIdentity = 'STUDENT';

        function switchIdentity(identity) {
            window.currentIdentity = identity;
            const toggleStudent = document.getElementById('toggleStudent');
            const toggleTeacher = document.getElementById('toggleTeacher');

            if (identity === 'STUDENT') {
                toggleStudent.classList.add('active');
                toggleTeacher.classList.remove('active');
            } else {
                toggleStudent.classList.remove('active');
                toggleTeacher.classList.add('active');
            }
            syncRegistrationIdentityLabels();
            clearFieldHint('identityError');
        }

        function syncRegistrationIdentityLabels() {
            const isTeacher = window.currentIdentity === 'TEACHER';
            const identityLabel = isTeacher ? '工号' : '学号';
            const groupLabel = document.getElementById('identifierGroupLabel');
            const idToggle = document.getElementById('toggleStudentId');
            const idInput = document.getElementById('studentId');
            const subtitle = document.querySelector('.auth-card__subtitle');
            if (groupLabel) groupLabel.textContent = '手机号 / ' + identityLabel;
            if (idToggle) idToggle.textContent = identityLabel + '注册';
            if (idInput) idInput.placeholder = '请输入' + identityLabel;
            if (subtitle) {
                subtitle.textContent = isTeacher
                    ? '创建教师账号，注册后即拥有导师身份'
                    : '加入 iLink，开启竞赛之旅';
            }
        }
    </script>
</body>
</html>
