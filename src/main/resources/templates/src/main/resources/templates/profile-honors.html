<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人成果 - iLink</title>
    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <th:block th:replace="~{fragments/head-assets :: redesign}"></th:block>
    <link href="/css/profile-redesign.css?v=1.1" rel="stylesheet">
</head>
<body data-profile-page="honors" th:data-user-id="${currentUser?.id}" class="ilink-page-bg">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <div th:replace="~{fragments/profile-sidebar :: sidebar (active='honors')}"></div>
            <div class="il-profile-content">
                <div class="il-section-card">
                    <div class="il-section-header">
                        <div>
                            <h2 class="il-section-title">个人成果</h2>
                            <p class="il-section-subtitle">你在成果展示中发布的内容</p>
                        </div>
                        <div class="il-section-header__actions">
                            <button id="btnManage" class="il-btn il-btn-ghost il-btn-sm">管理成果</button>
                            <a href="/gallery.html" class="il-btn il-btn-primary il-btn-sm">发布成果</a>
                        </div>
                    </div>
                    <div id="myAssetsList" style="min-height:120px;"></div>
                    <div id="myAssetsPager" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=8.2"></script>
    <script>
    (function(){
        var PAGE_SIZE=12,cp=1,uid=document.body.getAttribute('data-user-id');
        var manageMode=false,selectedIds={};
        function fd(d){if(!d)return'';var t=new Date(d);return isNaN(t.getTime())?'':t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
        function sc(d){
            var s = String(d||'');
            var m = s.match(/^<!--md:[^>]+-->/);
            if (m) s = s.replace(m[0], '');
            return s.replace(/（分类：[^）]*）/g,'').replace(/<[^>]+>/g, '').trim();
        }

        function renderCard(a){
            var cat=a.category||'其他',desc=sc(a.description),title=a.title||'未命名',id=a.id||'';
            desc=desc.length>80?desc.substring(0,80)+'…':desc;
            return '<div class="honor-asset-card'+(manageMode?' is-manage':'')+'" data-id="'+id+'" onclick="'+(manageMode?'event.stopPropagation();MyAssets.toggleSelect(this)':'location.href=\'/asset-detail.html?id='+id+'\'')+'">'
                +'<div class="honor-asset-card__cover"><span class="honor-asset-card__cover-text">'+escapeHtml(cat)+'</span></div>'
                +'<div class="honor-asset-card__body">'
                +'<div class="honor-asset-card__meta"><span class="honor-asset-card__tag">'+escapeHtml(cat)+'</span><span class="honor-asset-card__date">'+fd(a.createdAt)+'</span></div>'
                +'<h3 class="honor-asset-card__title">'+escapeHtml(title)+'</h3>'
                +(desc?'<p class="honor-asset-card__desc">'+escapeHtml(desc)+'</p>':'')
                +'<div class="honor-asset-card__foot"><span class="honor-asset-card__reads">阅读 '+(a.viewCount||0)+'</span>'
                +'<div class="honor-asset-card__actions" onclick="event.stopPropagation()">'
                +'<button class="il-btn il-btn-ghost il-btn-xs" onclick="MyAssets.edit(\''+id+'\')">编辑</button>'
                +'<button class="il-btn il-btn-ghost il-btn-xs honor-asset-card__del-btn" onclick="MyAssets.del(\''+id+'\')">删除</button>'
                +'</div></div>'
                +'<div class="honor-asset-card__check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>'
                +'</div></div>';
        }

        async function load(p){
            cp=Math.max(1,p||1);
            var L=document.getElementById('myAssetsList'),P=document.getElementById('myAssetsPager');
            if(!L)return;L.innerHTML='<p style="text-align:center;color:var(--ui-text-muted);padding:40px 0;">加载中…</p>';
            try{
                var r=await apiFetch('/api/asset/list?page='+cp+'&size='+PAGE_SIZE,{credentials:'same-origin'});
                var d=await r.json();
                if(d.code!==200){L.innerHTML='<p style="color:#ef4444;text-align:center;padding:32px;">'+escapeHtml(d.message||'加载失败')+'</p>';P.innerHTML='';return;}
                var all=d.data||[],mine=all.filter(function(a){return a&&(String(a.userId)===String(uid)||(a.ownerPreview&&String(a.ownerPreview.id)===String(uid)));});
                var total=mine.length,start=(cp-1)*PAGE_SIZE,items=mine.slice(start,start+PAGE_SIZE);
                if(!items.length){L.innerHTML='<div style="text-align:center;padding:56px 0;"><p style="font-size:15px;font-weight:600;color:var(--ui-text-muted);margin:0 0 8px;">还没有发布成果</p><p style="font-size:13px;color:var(--ui-text-muted);margin:0 0 16px;">前往成果展示页面发布你的第一个成果</p><a href="/gallery.html" class="il-btn il-btn-primary il-btn-sm">去发布</a></div>';P.innerHTML='';return;}
                var h='<div class="honor-asset-grid">';
                items.forEach(function(a){h+=renderCard(a);});
                L.innerHTML=h+'</div>';
                var tp=Math.ceil(total/PAGE_SIZE);
                if(tp>1){P.innerHTML='<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px;"><button class="il-btn il-btn-ghost il-btn-sm" onclick="MyAssets.load('+(cp-1)+')" '+(cp<=1?'disabled':'')+'>上一页</button><span style="font-size:13px;color:var(--ui-text-muted);">第 '+cp+' / '+tp+' 页</span><button class="il-btn il-btn-ghost il-btn-sm" onclick="MyAssets.load('+(cp+1)+')" '+(cp>=tp?'disabled':'')+'>下一页</button></div>';}
                else P.innerHTML='';
            }catch(e){console.error(e);L.innerHTML='<p style="color:#ef4444;text-align:center;padding:32px;">网络错误</p>';P.innerHTML='';}
        }

        function toggleManage(){
            manageMode=!manageMode;
            selectedIds={};
            document.getElementById('btnManage').textContent=manageMode?'完成管理':'管理成果';
            document.getElementById('btnManage').classList.toggle('is-active',manageMode);
            document.querySelectorAll('.honor-asset-card').forEach(function(c){c.classList.toggle('is-manage',manageMode);});
            updateBatchUI();
        }

        function toggleSelect(card){
            var id=card.getAttribute('data-id');
            if(selectedIds[id]){delete selectedIds[id];card.classList.remove('is-selected');}
            else{selectedIds[id]=true;card.classList.add('is-selected');}
            updateBatchUI();
        }

        function updateBatchUI(){
            var n=Object.keys(selectedIds).length;
            var bar=document.getElementById('batchBar');
            var list=document.getElementById('myAssetsList');
            if(!bar&&n>0&&list){
                bar=document.createElement('div');
                bar.id='batchBar';
                bar.className='honor-batch-bar';
                bar.innerHTML='<span id="batchCount">已选 '+n+' 项</span><button class="il-btn il-btn-danger il-btn-xs" onclick="MyAssets.batchDel()">批量删除</button>';
                list.parentNode.insertBefore(bar,list);
            }
            if(bar){
                if(n===0){bar.remove();}
                else{document.getElementById('batchCount').textContent='已选 '+n+' 项';}
            }
        }

        function edit(id){window.location.href='/profile-asset-edit.html?id='+id;}

        function del(id){
            if(!confirm('确定删除该成果？'))return;
            apiFetch('/api/asset/'+id,{method:'DELETE',credentials:'same-origin'}).then(function(r){return r.json();}).then(function(d){
                if(d.code===200){load(cp);showMessage('已删除','success');}else{showMessage(d.message||'删除失败','error');}
            }).catch(function(){showMessage('网络错误','error');});
        }

        function batchDel(){
            var ids=Object.keys(selectedIds);
            if(!ids.length)return;
            if(!confirm('确定删除选中的 '+ids.length+' 项成果？'))return;
            Promise.all(ids.map(function(id){return apiFetch('/api/asset/'+id,{method:'DELETE',credentials:'same-origin'}).then(function(r){return r.json();});}))
                .then(function(results){var ok=results.filter(function(r){return r.code===200;}).length;selectedIds={};manageMode=false;document.getElementById('btnManage').textContent='管理成果';document.getElementById('btnManage').classList.remove('is-active');load(cp);showMessage('已删除 '+ok+' 项','success');})
                .catch(function(){showMessage('网络错误','error');});
        }

        document.getElementById('btnManage').onclick=toggleManage;
        window.MyAssets={load:load,edit:edit,del:del,toggleSelect:toggleSelect,batchDel:batchDel};
        document.addEventListener('DOMContentLoaded',function(){load(1);});
    })();
    </script>
</body>
</html>
