<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - iLink</title>
    <th:block th:replace="fragments/head-assets :: auth"></th:block>
    <!-- 粒子配置钩子：必须在 common.js 之前设置，由其统一初始化，避免双重实例化 -->
    <script>
        window.ILINK_PARTICLE_OPTIONS = {
            density: 0.00015,
            minParticles: 80,
            maxParticles: 150,
            sizeRange: [2, 4],
            speedScale: 0.35,
            opacityRange: [0.35, 0.6],
            colors: ['45, 111, 247', '74, 140, 255'],  // 学术蓝双色调
            connectDistance: 150,
            connectOpacity: 0.6,
            lineWidth: 1.2,
            mouseRadius: 130,
            mouseForce: 1.5,
            pulse: true,
            pulseSpeed: 0.014,
            pulseAmount: 0.1
        };
    </script>
</head>
<body class="auth-page--login" data-particles="true" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <!-- 粒子背景（与首页一致的 ParticleSystem，此处用更稀疏柔和的配置） -->
    <canvas id="particleCanvas" class="particle-canvas particle-canvas--auth" aria-hidden="true"></canvas>

    <div class="floating-shapes" aria-hidden="true">
        <div class="shape shape--1"></div>
        <div class="shape shape--2"></div>
        <div class="shape shape--3"></div>
        <div class="shape shape--4"></div>
        <div class="shape shape--5"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-logo">
                <div class="brand-logo__icon">iL</div>
            </div>

            <div class="auth-card__header">
                <h1 class="auth-card__title">欢迎回来</h1>
                <p class="auth-card__subtitle">登录你的 iLink 账号</p>
            </div>

            <form id="loginForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="form-group">
                    <label for="identifier">手机号或学号/工号</label>
                    <div class="input-wrapper">
                        <input type="text" id="identifier" name="identifier"
                               placeholder="请输入手机号或学号/工号" required autocomplete="username">
                    </div>
                    <div class="error-message il-field-hint" id="identifierError"></div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password"
                               placeholder="请输入密码" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="显示/隐藏密码">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="error-message il-field-hint" id="passwordError"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="il-link">忘记密码?</a>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">登录</button>
                <div id="errorMessage" class="alert"></div>
            </form>

            <div class="auth-card__footer">
                还没有账号？<a href="/register" class="il-link">立即注册</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js?v=7.4"></script>
    <script src="/js/login.js?v=7.5"></script>
    <script>
        function togglePasswordVisibility() {
            const pwd = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                pwd.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }
    </script>
</body>
</html>
