<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - iLink</title>
    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
</head>
<body data-app-page="legal" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>
    <main class="legal-page">
        <p class="legal-page__eyebrow">账号帮助</p>
        <h1>找回密码</h1>
        <p class="legal-page__lead">当前版本暂未开放自助重置密码。请联系平台管理员核验身份后处理，或使用可验证的新手机号重新注册。</p>
        <div class="legal-page__actions">
            <a href="/login.html" class="il-btn il-btn-primary">返回登录</a>
            <a href="/register.html" class="il-btn il-btn-secondary">重新注册</a>
        </div>
    </main>
    <script src="/lib/bootstrap.bundle.min.js?v=4.3"></script>
    <script src="/js/common.js?v=7.8"></script>
</body>
</html>
