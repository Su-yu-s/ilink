<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞赛目录 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/competitions.css?v=3.0" rel="stylesheet">
    <link href="/css/search-bar.css?v=1.0" rel="stylesheet">
</head>
<body data-app-page="competitions" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'competition')"></div>

    <div class="container main-content">
        <canvas id="particleCanvas" class="particle-canvas"></canvas>

        <div class="competition-hub mx-auto">
            <div class="il-hero">
                <span class="il-hero__eyebrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    赛事信息 · 备赛参考
                </span>
                <h1 class="il-hero__title">竞赛目录</h1>
                <p class="il-hero__desc">汇总国内高校常见学科竞赛与创新创业赛事，便于检索赛道、主办单位与大致赛季。具体章程与报名时间以各赛官网为准。</p>
            </div>

            <div class="il-search-bar competition-toolbar">
                <div class="il-search-bar__tags competition-track-tabs" id="competitionTrackTabs">
                </div>

                <div class="il-search-bar__input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="search" id="compSearchInput" class="il-search-bar__input" placeholder="搜索竞赛名称、标签…" aria-label="搜索竞赛">
                </div>

                <button type="button" class="il-search-bar__btn il-search-bar__btn--primary" id="compSearchBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    搜索
                </button>
            </div>

            <div id="competitionGrid" class="row g-4 competition-grid">
            </div>

            <div id="competitionEmpty" class="empty-state text-center py-5 rounded-3 border border-dashed bg-white bg-opacity-50 d-none">
                <p class="text-muted mb-0">没有匹配的竞赛，试试其它分类或关键词。</p>
            </div>

            <nav id="competitionPager" class="mt-3 d-none" aria-label="竞赛目录分页">
                <ul class="pagination pagination-sm justify-content-center mb-0" id="competitionPagerInner"></ul>
            </nav>

            <p class="small text-muted text-center mt-3 mb-0" id="competitionCountHint"></p>
        </div>
    </div>


    <script src="/lib/bootstrap.bundle.min.js?v=4.2"></script>
    <script src="/js/common.js?v=7.8"></script>
    <script src="/js/ui-particles.js?v=1.0"></script>
    <script src="/js/competitions.js?v=4.4"></script>
</body>
</html>
