<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组队大厅 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/team-market.css?v=2.0" rel="stylesheet">
</head>
<body data-app-page="team-market" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, 'team')"></div>

    <div class="il-page-wrapper">

        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-inner">
                <div class="hero-eyebrow">组队招募 · 竞赛协作</div>
                <h1 class="hero-title">独行快，众行远。</h1>
                <p class="hero-desc">
                    发布你的组队需求，寻找志同道合的竞赛伙伴。一个人的力量有限，一群人的可能无限。
                </p>
            </div>
        </section>

        <!-- Search Panel -->
        <section class="toolbar-section">
            <div class="toolbar-inner">
                <div class="search-panel">
                    <div class="search-input-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="keyword" placeholder="搜索标题、描述或技能">
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-select">
                        <select id="category" aria-label="分类">
                            <option value="">全部分类</option>
                            <option value="技术开发">技术开发</option>
                            <option value="创意设计">创意设计</option>
                            <option value="市场营销">市场营销</option>
                            <option value="学术研究">学术研究</option>
                        </select>
                    </div>
                    <div class="search-select">
                        <select id="status" aria-label="状态">
                            <option value="">全部状态</option>
                            <option value="招募中">招募中</option>
                            <option value="已完成">已完成</option>
                        </select>
                    </div>
                    <button type="button" class="search-btn" id="searchBtn">搜索</button>
                    <button type="button" class="search-reset" id="resetBtn">重置</button>
                    <div class="search-apply">
                        <a href="/team-publish.html" class="btn-pill-accent">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                            发布需求
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Team List -->
        <section class="content-section">
            <div class="content-inner">
                <div id="teamList"></div>

                <!-- Pagination -->
                <nav id="pagination" class="mt-4 d-none">
                    <ul class="pagination justify-content-center">
                    </ul>
                </nav>
            </div>
        </section>

    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.0"></script>
    <script src="/js/common.js?v=7.8"></script>
    <script src="/js/team-market.js?v=4.6"></script>
</body>
</html>
