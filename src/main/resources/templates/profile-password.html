<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
</head>
<body data-profile-page="password" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper">
        <div class="il-profile-layout">
            <aside class="il-profile-sidebar">
                <h3 class="il-profile-sidebar-title">个人中心</h3>
                <p class="il-profile-sidebar-subtitle">管理您的账号</p>
                <nav class="il-profile-nav">
                    <a href="/profile.html" class="il-profile-nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"/>
                        </svg>
                        概览
                    </a>
                    <a href="/profile-edit.html" class="il-profile-nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 12a5 5 0 100-10a5 5 0 000 10z"/>
                            <path d="M4 22a8 8 0 0116 0"/>
                        </svg>
                        编辑资料
                    </a>
                    <a href="/profile-honors.html" class="il-profile-nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3l2.4 7.4H22l-6 4.6 2.3 7L12 17.8 5.7 22 8 14.4 2 10.6h7.6L12 3z"/>
                        </svg>
                        个人成果
                    </a>
                    <a href="/profile-posts.html" class="il-profile-nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 4h10a2 2 0 012 2v14l-4-2.5L11 18l-4 1.5V6a2 2 0 012-2z"/>
                            <path d="M9 9h6M9 13h4"/>
                        </svg>
                        我的文章
                    </a>
                    <a href="/profile-favorites.html" class="il-profile-nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.8l2.8 5.7 6.3.9-4.6 4.6 1.1 6.2L12 17.9 6.4 20.1l1.1-6.2L2.9 9.4l6.3-.9L12 2.8z"/>
                        </svg>
                        我的收藏
                    </a>
                    <a href="/profile-password.html" class="il-profile-nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2z"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        修改密码
                    </a>
                </nav>
            </aside>

            <div class="il-profile-content">
                <div class="il-section-card">
                    <div class="il-section-header">
                        <h2 class="il-section-title">修改密码</h2>
                        <p class="il-section-subtitle">定期更换密码有助于保护账号安全</p>
                    </div>

                    <form id="passwordForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label" style="color: #6b7280; font-weight: 500;">旧密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-input" id="oldPassword" autocomplete="current-password" required placeholder="请输入当前密码">
                                <div class="invalid-feedback">请输入旧密码</div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label" style="color: #6b7280; font-weight: 500;">新密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-input" id="newPassword" autocomplete="new-password" required minlength="8" placeholder="至少 8 个字符（需含大小写字母和数字）">
                                <div class="invalid-feedback">新密码至少需要 8 个字符</div>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label" style="color: #6b7280; font-weight: 500;">确认新密码 <span class="text-danger">*</span></label>
                                <input type="password" class="il-input" id="confirmPassword" autocomplete="new-password" required minlength="8" placeholder="再次输入新密码">
                                <div class="invalid-feedback">两次输入的密码不一致</div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-4 pt-4 mt-4" style="border-top: 1px solid rgba(0, 0, 0, 0.08);">
                            <button type="submit" class="il-btn il-btn-primary" id="passwordSubmitBtn">确认修改</button>
                            <p class="mb-0" style="font-size: 13px; color: #9ca3af;">修改成功后需要重新登录。</p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="/lib/bootstrap.bundle.min.js?v=4.3"></script>
    <script src="/js/common.js?v=7.4"></script>
    <script src="/js/profile.js?v=4.3"></script>
    <script src="/js/profile-password.js?v=4.3"></script>

</body>
</html>
