<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户主页 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <link href="/css/profile-public.css?v=1.2" rel="stylesheet">
</head>
<body data-profile-page="public" class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
    <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="il-page-wrapper profile-public-page">

        <header class="profile-public-page__head">
            <h1 class="profile-public-page__title">用户主页</h1>
            <p class="profile-public-page__sub">兼览概览（基本信息、发布文字与成果摘要），不提供联系方式与编辑入口</p>
        </header>

        <div id="userInfo" class="profile-public-page__body"></div>
    </div>

    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=7.8"></script>
    <script src="/js/profile.js?v=74"></script>
</body>
</html>
