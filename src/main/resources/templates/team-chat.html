<!DOCTYPE html>
<html lang="zh-CN" class="ilink-app" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队聊天 - iLink</title>

    <th:block th:replace="fragments/head-assets :: core(bootstrap=true)"></th:block>
    <style>
        .chat-page {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            margin-top: 20px;
        }

        .chat-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .chat-header-text h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }

        .chat-header-text span {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .chat-header-actions {
            display: flex;
            gap: 8px;
        }

        .chat-header-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-header-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(30, 64, 175, 0.05);
        }

        .chat-body {
            flex: 1;
            display: flex;
            gap: 16px;
            overflow: hidden;
        }

        .chat-messages-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: white;
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
        }

        .message.sent .message-avatar {
            display: none;
        }

        .message-time {
            font-size: 11px;
        }

        .message-date-divider {
            text-align: center;
            padding: 12px 0;
            position: relative;
        }

        .message-date-divider span {
            background: var(--bg-muted);
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .chat-input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid var(--border-light);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input-actions {
            display: flex;
            gap: 4px;
        }

        .chat-input-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-muted);
            color: var(--text-tertiary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-input-btn:hover {
            background: var(--primary);
            color: white;
        }

        .chat-input-btn.attach:hover {
            background: var(--success);
        }

        .chat-textarea {
            flex: 1;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .chat-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-send-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .chat-send-btn:disabled {
            background: var(--bg-muted);
            color: var(--text-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .chat-sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
        }

        .chat-sidebar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .member-item:hover {
            background: var(--bg-muted);
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            position: relative;
        }

        .member-status {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .member-status.online {
            background: var(--success);
        }

        .member-status.offline {
            background: var(--text-tertiary);
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .member-role {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .chat-empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .chat-empty-icon svg {
            width: 40px;
            height: 40px;
            color: var(--text-tertiary);
        }

        .chat-empty h4 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .chat-empty p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            align-self: flex-start;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: var(--bg-muted);
            color: var(--text-secondary);
        }

        .connection-status.connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .connection-status.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        @media (max-width: 992px) {
            .chat-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .chat-page {
                height: calc(100vh - 80px);
                margin-top: 10px;
            }

            .message {
                max-width: 85%;
            }

            .chat-header {
                padding: 16px;
            }

            .chat-header-icon {
                width: 40px;
                height: 40px;
            }
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body class="ilink-page-bg" th:attr="data-user-id=${currentUser != null ? currentUser.id : null}">
        <div th:replace="fragments/header :: header(${currentUser}, '')"></div>

    <div class="container main-content">
        <canvas id="particleCanvas" class="particle-canvas"></canvas>

        <div class="chat-page">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-header-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="chat-header-text">
                        <h3 id="chatTitle">团队聊天</h3>
                        <span id="chatSubtitle">加载中...</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <div class="connection-status" id="connectionStatus">
                        <span class="status-dot"></span>
                        <span id="connectionText">连接中...</span>
                    </div>
                    <button class="chat-header-btn" onclick="chatManager.loadHistory()" title="加载历史消息">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3.51 15C4.15839 16.8404 5.38734 18.4202 7.01166 19.5014C8.63598 20.5826 10.5677 21.1066 12.5157 20.9945C14.4637 20.8824 16.3226 20.1402 17.8121 18.8798C19.3015 17.6193 20.3413 15.9081 20.7742 14.0068C21.2071 12.1054 21.0102 10.1129 20.2126 8.33121C19.4151 6.54955 18.0603 5.07606 16.3528 4.13276C14.6454 3.18945 12.68 2.83114 10.7741 3.11212C8.86821 3.3931 7.12221 4.29761 5.81 5.68L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="chat-body">
                <div class="chat-messages-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="chat-empty" id="chatEmpty">
                            <div class="chat-empty-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <h4>开始聊天</h4>
                            <p>发送消息，与团队成员沟通协作</p>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <div class="chat-input-actions">
                                <button class="chat-input-btn attach" onclick="document.getElementById('fileInput').click()" title="发送文件">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M21.44 11.05L12.25 20.24C11.1241 21.3659 9.59718 21.9983 8.005 21.9983C6.41282 21.9983 4.88589 21.3659 3.76 20.24C2.63501 19.1149 2.00269 17.588 2.00269 15.9958C2.00269 14.4036 2.63501 12.8767 3.76 11.7508L12.95 2.56001C13.7004 1.80952 14.7185 1.38776 15.785 1.38776C16.8515 1.38776 17.8696 1.80952 18.62 2.56001C19.3705 3.31049 19.7922 4.32857 19.7922 5.39505C19.7922 6.46153 19.3705 7.47962 18.62 8.23009L9.41001 17.43C9.03488 17.8052 8.52568 18.0007 7.99501 18.0007C7.46433 18.0007 6.95514 17.8052 6.58001 17.43C6.20488 17.0548 6.00936 16.5457 6.00936 16.015C6.00936 15.4843 6.20488 14.9751 6.58001 14.6L14.17 7.00001" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <input type="file" id="fileInput" onchange="chatManager.handleFileSelect(event)">
                            </div>
                            <textarea class="chat-textarea" id="messageInput" placeholder="输入消息..." rows="1" onkeydown="chatManager.handleKeyDown(event)" oninput="chatManager.autoResize(this)"></textarea>
                            <button class="chat-send-btn" id="sendBtn" onclick="chatManager.sendMessage()" title="发送">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="chat-sidebar">
                    <div class="chat-sidebar-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 21V19C17 17.9391 16.5786 16.9217 15.8284 16.1716C15.0783 15.4214 14.0609 15 13 15H5C3.93913 15 2.92172 15.4214 2.17157 16.1716C1.42143 16.9217 1 17.9391 1 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M23 21V19C22.9993 18.1137 22.7044 17.2528 22.1614 16.5523C21.6184 15.8519 20.8581 15.3516 20 15.13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16 3.13C16.8604 3.35031 17.623 3.85071 18.1676 4.55232C18.7122 5.25392 19.0078 6.11683 19.0078 7.005C19.0078 7.89318 18.7122 8.75608 18.1676 9.45769C17.623 10.1593 16.8604 10.6597 16 10.88" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        团队成员
                        <span id="memberCount" style="font-weight: normal; color: var(--text-tertiary);">(0)</span>
                    </div>
                    <div class="member-list" id="memberList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="/lib/bootstrap.bundle.min.js?v=5.0"></script>
    <script src="/js/common.js?v=7.4"></script>
    <script src="/js/team-chat.js?v=1"></script>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
